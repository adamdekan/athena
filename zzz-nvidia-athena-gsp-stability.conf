# ATHENA GPU stability — mitigate the Blackwell open-driver GSP firmware fault.
#
# ⚠️  FILENAME IS LOad-BEARING — it MUST sort LAST among /etc/modprobe.d/*.conf.
#   modprobe concatenates every `options nvidia` line across /etc/modprobe.d in
#   C-locale filename order and the kernel applies module params LAST-ASSIGNMENT-WINS.
#   The distro ships /etc/modprobe.d/nvidia.conf with:
#       options nvidia NVreg_EnableS0ixPowerManagement=1
#   The ORIGINAL name of this file (nvidia-athena-gsp-stability.conf) sorted BEFORE
#   nvidia.conf ('-' 0x2d < '.' 0x2e), so nvidia.conf's =1 won and SILENTLY DEFEATED
#   the S0ix-disable below — the 20260701-074343 run booted with this conf installed
#   yet still had S0ix ENABLED (confirmed in that run's power-state.log) and crashed
#   with Xid 69 + a kernel panic. The `zzz-` prefix makes this file sort AFTER
#   nvidia.conf so its values win. Do NOT rename it back. (Verify after boot with:
#   grep -i EnableS0ix /proc/driver/nvidia/params  → expect 0.  /sys/module is
#   virtualized away in ATHENA's GPU-passthrough container, so use /proc, not /sys.)
#
# WHAT THIS FIXES
#   The 20260630 crash chain began with a kernel GSP RPC-transport fault:
#       NVRM: GspMsgQueueReceiveStatus: Bad checksum
#   which corrupted the GSP<->driver ring buffer, took the GPU context down, and
#   (under CUDA MPS) poisoned all three ATHENA processes. This is a KNOWN, still-
#   unresolved bug on the NVIDIA open kernel module 595.x + Blackwell laptop GPUs:
#     - open-gpu-kernel-modules #1064 (Blackwell laptop, 595.x): GSP heartbeat /
#       assert errors fire on every runtime-PM D3cold->D0 wake with S0ix enabled.
#     - open-gpu-kernel-modules #1111 (sm_120): GSP halt under sustained llama.cpp
#       inference (ATHENA's exact workload).
#   GSP itself CANNOT be disabled on Blackwell (mandatory for the open module), so
#   the mitigation is to remove the runtime power-state transitions (D3cold<->D0,
#   S0ix) that correlate with the RPC corruption, and keep the GPU resident in D0.
#
# PERFORMANCE COST: none on compute. These affect IDLE power management only — the
#   GPU stays powered (D0), which raises idle draw/heat slightly (fine on AC;
#   costs battery when idle). Clocks, VRAM, and inference throughput are untouched.
#
# NOT A VENDOR-CONFIRMED CURE: NVIDIA has published no fix. This removes the
#   strongest empirical trigger; a residual GSP fault is still possible and will be
#   captured by ATHENA's xid.log/dmesg for a bug report against #1064/#1111.
#
# APPLY: use ./apply-gsp-stability.sh (recommended), or manually:
#   sudo install -m 0644 zzz-nvidia-athena-gsp-stability.conf /etc/modprobe.d/
#   sudo rm -f /etc/modprobe.d/nvidia-athena-gsp-stability.conf   # remove any legacy copy
#   sudo update-initramfs -u        # (Debian/Ubuntu; dracut -f on Fedora; skip if nvidia modeset=0)
#   # optional, belt-and-suspenders for the PCIe link that carries GSP RPC:
#   #   add  pcie_aspm=off  to GRUB_CMDLINE_LINUX_DEFAULT, then sudo update-grub
#   sudo reboot
# REVERT: sudo rm /etc/modprobe.d/zzz-nvidia-athena-gsp-stability.conf; sudo update-initramfs -u; reboot

# NVreg_PreserveVideoMemoryAllocations=0 (CHANGES.MD §12 A/B): with RTD3 and S0ix both
# OFF (above), preserving VRAM across power-state transitions no longer happens at
# runtime, so this feature has ~zero benefit for ATHENA — and its host-RAM page
# save/restore path is the leading suspect for the non-fatal kernel "BUG: Bad page
# state … page still charged to cgroup" seen on 20260701-123219. Distinct from nvidia.conf,
# which sets =1; the zzz- sort order makes THIS value (0) win. Verify after reboot:
#   grep -i PreserveVideoMemory /proc/driver/nvidia/params   → expect 0
# Revert this one lever with =1 if a regression appears (it had been =1 since April).
options nvidia NVreg_DynamicPowerManagement=0x00 NVreg_EnableS0ixPowerManagement=0 NVreg_PreserveVideoMemoryAllocations=0
