# ATHENA GSP/RPC diagnostics — route GPU firmware (GSP) logs into the kernel log so
# a Blackwell GSP fault (open-gpu-kernel-modules #1064/#1111) leaves detail in dmesg
# (hence in athena-kmsg-logger's kmsg-full.log AND the efi-pstore panic dump),
# instead of only in the driver's debugfs gsp_log — which is unavailable inside
# ATHENA's GPU-passthrough container (/sys is virtualized).
#
# The `zzz-` prefix makes this file sort AFTER the distro's nvidia.conf in modprobe's
# C-locale read order, so its value wins (kernel module params are last-assignment-wins).
#
#   NVreg_EnableGpuFirmwareLogs=1  dump GSP firmware logs to dmesg on a GSP error.
#                                  Low-noise (only logs on error). Set =2 for
#                                  CONTINUOUS logging if =1 misses the fault window.
#
# Applies on the next boot (nvidia is modeset=0, so no initramfs rebuild is needed).
# Installed/removed by ./apply-crash-capture.sh (recommended).

options nvidia NVreg_EnableGpuFirmwareLogs=1
