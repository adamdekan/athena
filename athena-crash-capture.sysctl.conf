# ATHENA crash capture — turn a silent GPU-driver hard-lock into a real kernel
# panic() so kmsg_dump writes the RIP + call-trace tail into efi-pstore (EFI NVRAM),
# which SURVIVES the cold power-cycle a hard lock forces. The 20260701-074343 lock
# emitted a kernel oops at 07:52:45 (i.e. it was panic-CAPABLE) but no panic fired,
# so the trace was never persisted and the box just wedged ~68 s later.
#
# Installed to /etc/sysctl.d/99-athena-crash.conf and applied live with
#   sudo sysctl --system      (by ./apply-crash-capture.sh).
#
# panic_on_oops=1  : the observed 07:52:45 oops would now escalate to panic()→dump.
# panic=30         : auto-reboot 30 s after a panic (self-recovery; also gives
#                    kmsg_dump time to write pstore before the reset).
# nmi_watchdog=1   : enable the detector that feeds the hard-lockup path.
# hardlockup_panic=1 : a true CPU hard-lockup panics (→ dump) instead of hanging.
# softlockup_panic=0 : deliberately OFF — soft-lockups can false-fire under ATHENA's
#                    sustained load + ~161 GiB mlock; we don't want spurious panics.

# ── DEMO MODE (CHANGES.MD §19) ────────────────────────────────────────────────
# panic_on_oops and hardlockup_panic are OFF: every recent fatal event was a
# TASK-CONTEXT oops on a throwaway victim process (curl, date) — survivable kills
# that the old =1 settings needlessly escalated into a full reboot. With =0 the
# victim process dies, the kernel taints, and the demo keeps running (the
# llama-server watchdog even recovers TTS if it is the victim). Trade-offs:
#   - an oops IN INTERRUPT context still panics unconditionally (kernel rule);
#     kernel.panic=30 stays ON so that case self-recovers in 30 s + is captured.
#   - a true NMI hard-lockup now freezes instead of rebooting (pre-§11 behavior).
#   - latent corruption is no longer halted at first detection — acceptable for a
#     demo, wrong for forensics.
# FORENSICS MODE (re-arm after the demo): set panic_on_oops=1 and
# hardlockup_panic=1 below, then re-run ./apply-crash-capture.sh.
kernel.panic_on_oops = 0
kernel.panic = 30
kernel.nmi_watchdog = 1
kernel.hardlockup_panic = 0
kernel.softlockup_panic = 0
