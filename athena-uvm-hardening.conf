# ATHENA UVM hardening (CHANGES.MD §16, Fix 1) — shrink nvidia_uvm's host folio-
# lifecycle machinery, the code neighborhood of the live-struct-page corruption.
#
# EVIDENCE (adversarially verified, runs 20260630-230402 .. 20260702-083108):
#   Every fatal panic on this box is in-place single-byte corruption of live kernel
#   page metadata (4× GPF at lruvec_stat_mod_folio on garbage folio->memcg pointers,
#   1× corrupted page-cache XArray). DMA is REFUTED (dGPU sat in a translated DMA-FQ
#   IOMMU domain, zero DMAR faults; the corrupted regions are never IOVA-mapped) —
#   the writer executes on the CPU, in kernel context, under GPU/UVM activity.
#   Leading hypothesis: CVE-2026-43303-class stale-struct-page-field bug exercised
#   by driver/UVM kernel paths. True fix = kernel >= 7.0.13-1 (or 6.12.94 trixie-
#   security). This conf removes exposure meanwhile:
#
#   uvm_disable_hmm=1  Drops UVM's HMM/ZONE_DEVICE integration: no ~380 MB device
#                      struct-page array in host memory, no mmu_notifier /
#                      migrate_vma / devmem-folio-free hooks — precisely the folio-
#                      lifecycle code neighboring the corruption. ZERO cost here:
#                      ATHENA is cudaMalloc-only (no managed memory), and MPS
#                      clients cannot use HMM anyway.
#   uvm_ats_mode=0     Forecloses the Blackwell physical-ATS-prefetcher hazard
#                      around IOMMU transitions (uvm_blackwell.c). ZERO cost:
#                      nothing in the stack uses ATS address translation services.
#
# Both param names verified present on this exact 595.71.05 build
# (/sys/module/nvidia_uvm/parameters/{uvm_disable_hmm,uvm_ats_mode}, were N and 1).
# APPLY: ./apply-gsp-stability.sh (installs this alongside the GSP conf) + reboot.
# VERIFY: cat /sys/module/nvidia_uvm/parameters/uvm_disable_hmm  -> Y or 1
#         cat /sys/module/nvidia_uvm/parameters/uvm_ats_mode    -> 0
# REVERT: delete /etc/modprobe.d/athena-uvm-hardening.conf + reboot.

options nvidia_uvm uvm_disable_hmm=1 uvm_ats_mode=0
